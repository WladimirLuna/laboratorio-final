name: lab-final
on:
  push:
    branches:
      - feature-lab-final

jobs:

  SAST:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Set environment variables
        run: echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITGUB_ENV
      
      - name: Validate and Configure build.gradle
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    
        run: |
          if [ -f "build.gradle" ]; then
            echo "Encontró Archivo"
            echo "Verificando configuración"
            if ! grep -q 'id "org.sonarqube" version "3.3"' build.gradle; then
              echo "No se encuentra Plugin configurado"
              sed -i '/id '\''java'\''/a \ \ \ \ id '\''org.sonarqube'\'' version '\''3.3'\''' build.gradle
              echo "plugin de SonarCloud agregado a build.gradle"
              cat build.gradle
            else
              echo "plugin ya estaba configurado en build.gradle"
            fi
          else
            echo "No se encontró el archivo"
            exit 1
          fi

  DEPLOY:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: |
          echo "Despliegue"

    
        
